<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTL - Abdur Rahman Adil</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Fontawesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family:
          "Trebuchet MS", "Lucida Sans Unicode", "Lucida Grande", "Lucida Sans",
          Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <section
      class="w-full min-h-screen bg-slate-700 flex items-center justify-center p-3"
    >
      <div class=" max-w-md p-8 rounded-md bg-base-200 w-full  shadow-lg ">
        <h1 class="text-2xl font-semibold">
          <i class="fa-solid fa-bullhorn text-purple-500 tracking-tighter -rotate-10"></i>
          Text <span class="text-purple-500">To</span> Speech
        </h1>


        <textarea name="textarea" id="text-input" class="textarea w-full my-4 outline-0 border border-purple-500 resize-none h-50" placeholder="Type anything here...." ></textarea>


        <button class="btn bg-purple-500 font-semibold text-white w-full text-md" id="listen-btn">
            <i class="fas fa-play"></i>
            <span id="text">Listen</span>
        </button>

        <p class="mt-4 text-black/30 text-sm select-none text-center">&copy;Abdur Rahman Adil</p>
      </div>
    </section>

    <script src="speech.js"></script>
  </body>
</html>
